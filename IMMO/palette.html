<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Générateur de Palettes</title>
    <style>
        :root { --main-color: #0d6efd; }
        .color-card {
            height: 120px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .color-card:hover { transform: scale(1.05); }
        .color-val { font-family: monospace; font-weight: bold; font-size: 0.9rem; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 4px; }
        .type-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.9; }
        #colorPicker { width: 100%; height: 50px; cursor: pointer; border: none; padding: 0; background: none; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm p-4 mb-4">
                <h4 class="fw-bold mb-4">🎨 Palette de Couleurs</h4>
                
                <div class="row align-items-center g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">COULEUR DE BASE</label>
                        <input type="color" id="colorPicker" value="#0d6efd">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label small fw-bold">HEXADÉCIMAL</label>
                        <input type="text" id="hexInput" class="form-control" value="#0d6efd">
                    </div>
                </div>
            </div>

            <div id="paletteContainer" class="row g-3">
                </div>
            
            <div class="text-center mt-4">
                <p class="text-muted small">Cliquez sur une couleur pour copier le code HEX</p>
                <a href="admin.php" class="btn btn-sm btn-outline-secondary">Retour Admin</a>
            </div>
        </div>
    </div>
</div>

<script>
const picker = document.getElementById('colorPicker');
const hexInput = document.getElementById('hexInput');
const container = document.getElementById('paletteContainer');

// Conversion HEX vers HSL
function hexToHSL(hex) {
    let r = parseInt(hex.slice(1, 3), 16) / 255;
    let g = parseInt(hex.slice(3, 5), 16) / 255;
    let b = parseInt(hex.slice(5, 7), 16) / 255;
    let max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, l = (max + min) / 2;

    if (max === min) { h = s = 0; } 
    else {
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
    }
    return { h: h * 360, s: s * 100, l: l * 100 };
}

// Conversion HSL vers HEX
function hslToHex(h, s, l) {
    l /= 100;
    const a = s * Math.min(l, 1 - l) / 100;
    const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
}

function generatePalette() {
    const baseHex = picker.value;
    hexInput.value = baseHex;
    const hsl = hexToHSL(baseHex);
    
    // Définition des règles de la palette
    const colors = [
        { label: 'Base', h: hsl.h, s: hsl.s, l: hsl.l },
        { label: 'Complémentaire', h: (hsl.h + 180) % 360, s: hsl.s, l: hsl.l },
        { label: 'Triade 1', h: (hsl.h + 120) % 360, s: hsl.s, l: hsl.l },
        { label: 'Triade 2', h: (hsl.h + 240) % 360, s: hsl.s, l: hsl.l },
        { label: 'Analogue', h: (hsl.h + 30) % 360, s: hsl.s, l: hsl.l }
    ];

    container.innerHTML = '';
    colors.forEach(c => {
        const hex = hslToHex(c.h, c.s, c.l);
        const col = document.createElement('div');
        col.className = 'col-md-4 col-6';
        col.innerHTML = `
            <div class="color-card shadow-sm" style="background-color: ${hex}" onclick="copyToClipboard('${hex}')">
                <span class="type-label">${c.label}</span>
                <span class="color-val">${hex.toUpperCase()}</span>
            </div>
        `;
        container.appendChild(col);
    });
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    alert('Copié : ' + text);
}

// Listeners
picker.addEventListener('input', generatePalette);
hexInput.addEventListener('input', (e) => {
    if(/^#[0-9A-F]{6}$/i.test(e.target.value)) {
        picker.value = e.target.value;
        generatePalette();
    }
});

// Init
generatePalette();
</script>

</body>
</html>
